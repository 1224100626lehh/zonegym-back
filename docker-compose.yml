version: "3.8"

services:
  web-server:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - app-logic
    networks:
      - zonegym-net

  app-logic:
    build: .
    expose:
      - "5000"
    env_file:
      - .env
    networks:
      - zonegym-net

networks:
  zonegym-net:
    driver: bridge